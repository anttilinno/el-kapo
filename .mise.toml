[tools]
go = "1.25"

[tasks.build]
description = "Build the el-kapo binary"
run = "go build -o el-kapo ./cmd/el-kapo"

[tasks.dev]
description = "Build and run el-kapo"
run = "go run ./cmd/el-kapo"

[tasks.build-web]
description = "Build the el-kapo-web binary"
run = "go build -o el-kapo-web ./cmd/el-kapo-web"

[tasks.web]
description = "Build and run el-kapo-web"
run = "go run ./cmd/el-kapo-web"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f el-kapo el-kapo-web"
